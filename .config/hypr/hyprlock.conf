# --- BACKGROUND ---
background {
    monitor =
    path = /home/tod/Pictures/lockscreen/lightcycle_101.png
    blur_passes = 3
    blur_size = 6
    brightness = 0.6
}

# --- TIME ---
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    font_family = JetBrainsMono Nerd Font
    font_size = 80
    position = 0, 200
    halign = center
    valign = center
    color = rgba(0, 229, 255, 0.95)
    shadow_passes = 3
    shadow_size = 10
    shadow_color = rgba(0, 229, 255, 0.5)
}

# --- DATE ---
label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %d %B')"
    font_family = JetBrainsMono Nerd Font
    font_size = 18
    position = 0, 120
    halign = center
    valign = center
    color = rgba(0, 229, 255, 0.5)
}

# --- INPUT FIELD ---
input-field {
    monitor =

    size = 280, 50
    position = 0, -200
    halign = center
    valign = center

    rounding = 30

    inner_color = rgba(0, 15, 25, 0.85)
    outer_color = rgba(0, 229, 255, 0.6)
    check_color = rgba(0, 255, 159, 0.8)
    fail_color = rgba(255, 46, 46, 0.8)

    outline_thickness = 2

    font_color = rgba(0, 229, 255, 0.95)
    font_family = JetBrainsMono Nerd Font

    placeholder_text = <i>Enter Password</i>

    shadow_passes = 3
    shadow_size = 10
    shadow_color = rgba(0, 229, 255, 0.3)
}