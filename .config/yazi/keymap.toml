[manager]
keymap = [
  { on = "<Esc>", run = "escape",             desc = "Exit visual mode, clear selected, or cancel search" },
  { on = "q",     run = "quit",               desc = "Exit the process" },
  { on = "Q",     run = "quit --no-cwd-file", desc = "Exit without writing cwd-file" },
  { on = "<C-q>", run = "close",              desc = "Close the current tab" },
  { on = "<C-z>", run = "suspend",            desc = "Suspend the process" },

  # Navigation
  { on = "k", run = "arrow -1",        desc = "Move cursor up" },
  { on = "j", run = "arrow 1",         desc = "Move cursor down" },
  { on = "K", run = "arrow -5",        desc = "Move cursor up 5 lines" },
  { on = "J", run = "arrow 5",         desc = "Move cursor down 5 lines" },
  { on = "h", run = "leave",           desc = "Go back to parent directory" },
  { on = "l", run = "enter",           desc = "Enter directory or open file" },
  { on = "H", run = "back",            desc = "Go back to previous directory" },
  { on = "L", run = "forward",         desc = "Go forward to next directory" },
  { on = "<Up>",    run = "arrow -1",  desc = "Move cursor up" },
  { on = "<Down>",  run = "arrow 1",   desc = "Move cursor down" },
  { on = "<Left>",  run = "leave",     desc = "Go back to parent directory" },
  { on = "<Right>", run = "enter",     desc = "Enter directory or open file" },
  { on = "<C-u>", run = "arrow -50%",  desc = "Move cursor up half page" },
  { on = "<C-d>", run = "arrow 50%",   desc = "Move cursor down half page" },
  { on = "<C-b>", run = "arrow -100%", desc = "Move cursor up one page" },
  { on = "<C-f>", run = "arrow 100%",  desc = "Move cursor down one page" },
  { on = "gg", run = "arrow -99999999", desc = "Jump to top" },
  { on = "G",  run = "arrow 99999999",  desc = "Jump to bottom" },

  # File operations
  { on = "y", run = "yank",           desc = "Copy file" },
  { on = "x", run = "yank --cut",     desc = "Cut file" },
  { on = "p", run = "paste",          desc = "Paste file" },
  { on = "P", run = "paste --force",  desc = "Paste file (overwrite)" },
  { on = "d", run = "remove",         desc = "Move file to trash" },
  { on = "D", run = "remove --permanently", desc = "Permanently delete file" },
  { on = "a", run = "create",         desc = "Create file or directory" },
  { on = "r", run = "rename --cursor=before_ext", desc = "Rename file" },
  { on = ";", run = "shell",          desc = "Run shell command" },
  { on = ":", run = "shell --block",  desc = "Run shell command (blocking)" },

  # Selection
  { on = "<Space>", run = "select --state=none", desc = "Toggle selection" },
  { on = "v",       run = "visual_mode",         desc = "Enter visual mode" },
  { on = "V",       run = "visual_mode --unset", desc = "Enter visual mode (unset)" },
  { on = "<C-a>",   run = "select_all --state=true",  desc = "Select all" },
  { on = "<C-r>",   run = "select_all --state=none",  desc = "Inverse selection" },

  # Search
  { on = "/", run = "find",           desc = "Find next file" },
  { on = "?", run = "find --previous", desc = "Find previous file" },
  { on = "n", run = "find_arrow",     desc = "Next found" },
  { on = "N", run = "find_arrow --previous", desc = "Previous found" },
  { on = "s", run = "search fd",      desc = "Search files (fd)" },
  { on = "S", run = "search rg",      desc = "Search file contents (rg)" },
  { on = "<C-s>", run = "search --reset", desc = "Cancel search" },

  # Misc
  { on = ".", run = "hidden toggle",  desc = "Toggle hidden files" },
  { on = "z", run = "plugin zoxide", desc = "Jump with zoxide" },
  { on = "Z", run = "plugin fzf",    desc = "Jump with fzf" },
  { on = "~", run = "cd ~",          desc = "Go home" },
  { on = "-", run = "cd -",          desc = "Go previous" },
  { on = "<Enter>", run = "open",    desc = "Open file" },
  { on = "o",       run = "open --interactive", desc = "Open interactively" },
  { on = "i",       run = "peek",    desc = "Peek file" },
  { on = "I",       run = "peek -1", desc = "Peek file (previous)" },

  # Tabs
  { on = "t",     run = "tab_create --current", desc = "New tab" },
  { on = "1",     run = "tab_switch 0", desc = "Switch to tab 1" },
  { on = "2",     run = "tab_switch 1", desc = "Switch to tab 2" },
  { on = "3",     run = "tab_switch 2", desc = "Switch to tab 3" },
  { on = "[",     run = "tab_switch -1 --relative", desc = "Previous tab" },
  { on = "]",     run = "tab_switch 1 --relative",  desc = "Next tab" },
  { on = "{",     run = "tab_swap -1", desc = "Swap tab left" },
  { on = "}",     run = "tab_swap 1",  desc = "Swap tab right" },

  # Copy path
  { on = ["c", "c"], run = "yank",                   desc = "Copy file" },
  { on = ["c", "p"], run = "copy path",              desc = "Copy path" },
  { on = ["c", "d"], run = "copy dirname",           desc = "Copy dir path" },
  { on = ["c", "f"], run = "copy filename",          desc = "Copy filename" },
  { on = ["c", "n"], run = "copy stem",              desc = "Copy stem" },

  # Sorting
  { on = ["m", "a"], run = "sort alphabetical --dir-first", desc = "Sort alphabetically" },
  { on = ["m", "m"], run = "sort modified --dir-first",     desc = "Sort by modified" },
  { on = ["m", "s"], run = "sort size --dir-first",         desc = "Sort by size" },
]

[tasks]
keymap = [
  { on = "<Esc>", run = "close", desc = "Close task manager" },
  { on = "<C-q>", run = "close", desc = "Close task manager" },
  { on = "w",     run = "close", desc = "Close task manager" },
  { on = "k",     run = "arrow -1", desc = "Move up" },
  { on = "j",     run = "arrow 1",  desc = "Move down" },
  { on = "<Up>",   run = "arrow -1", desc = "Move up" },
  { on = "<Down>", run = "arrow 1",  desc = "Move down" },
  { on = "<Enter>", run = "inspect", desc = "Inspect task" },
  { on = "x",       run = "cancel",  desc = "Cancel task" },
]

[input]
keymap = [
  { on = "<C-q>",   run = "close",          desc = "Cancel input" },
  { on = "<Esc>",   run = "close",          desc = "Cancel input" },
  { on = "<Enter>", run = "submit",         desc = "Submit input" },
  { on = "<C-h>", run = "backspace",        desc = "Backspace" },
  { on = "<Backspace>", run = "backspace",  desc = "Backspace" },
  { on = "<Delete>",    run = "delete",     desc = "Delete char" },
  { on = "<Left>",  run = "move -1",        desc = "Move left" },
  { on = "<Right>", run = "move 1",         desc = "Move right" },
  { on = "<C-a>",   run = "move -999",      desc = "Start of line" },
  { on = "<C-e>",   run = "move 999",       desc = "End of line" },
  { on = "<C-u>",   run = "kill bol",       desc = "Kill to start" },
  { on = "<C-k>",   run = "kill eol",       desc = "Kill to end" },
  { on = "<C-w>",   run = "kill backward",  desc = "Kill word back" },
  { on = "<C-d>",   run = "kill forward",   desc = "Kill word forward" },
]

[completion]
keymap = [
  { on = "<C-q>",   run = "close",          desc = "Cancel" },
  { on = "<Esc>",   run = "close",          desc = "Cancel" },
  { on = "<Enter>", run = "submit",         desc = "Submit" },
  { on = "<Tab>",   run = "submit",         desc = "Submit" },
  { on = "<Up>",    run = "arrow -1",       desc = "Move up" },
  { on = "<Down>",  run = "arrow 1",        desc = "Move down" },
  { on = "<C-p>",   run = "arrow -1",       desc = "Move up" },
  { on = "<C-n>",   run = "arrow 1",        desc = "Move down" },
]

[help]
keymap = [
  { on = "<Esc>",   run = "escape", desc = "Close or reset" },
  { on = "q",       run = "close",  desc = "Close help" },
  { on = "k",       run = "arrow -1", desc = "Move up" },
  { on = "j",       run = "arrow 1",  desc = "Move down" },
  { on = "<Up>",    run = "arrow -1", desc = "Move up" },
  { on = "<Down>",  run = "arrow 1",  desc = "Move down" },
  { on = "/",       run = "filter",   desc = "Filter" },
]
